name: Docker Build

on:
  push:
    branches:
      - main
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build and push (e.g. 0.20.0)'
        required: true
        type: string

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/freedomcashlabs/nutshell

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine Tags
        id: get_tags
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version_tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "latest_tag=latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version_tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "latest_tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "version_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "latest_tag=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Python
        if: github.event_name == 'release'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify Versions
        if: github.event_name == 'release'
        run: |
          python3 scripts/check_version.py "${{ steps.get_tags.outputs.version_tag }}"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' || (github.event_name == 'release' && github.event.action == 'released') || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.get_tags.outputs.version_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.get_tags.outputs.latest_tag }}
          platforms: linux/amd64
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image
        if: steps.build.outputs.digest != ''
        run: cosign sign --yes "${IMAGE_NAME}@${{ steps.build.outputs.digest }}"

      - name: Attest build provenance
        if: steps.build.outputs.digest != ''
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
